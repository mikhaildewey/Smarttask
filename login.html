<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Scheduler - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0F1015] h-screen flex items-center justify-center font-sans text-white">

    <div class="bg-[#1A1C28] p-10 rounded-2xl shadow-xl w-96 flex flex-col items-center">
        <h1 class="text-2xl font-bold text-center mb-1">Smart Task Scheduler</h1>
        <p class="text-gray-400 text-sm mb-6 text-center">Organize your tasks smarter.</p>

        <input type="email" id="email" placeholder="Email Address" 
               class="w-full bg-[#252836] text-white px-4 py-3 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-[#7B51D3]">
        
        <input type="password" id="password" placeholder="Password" 
               class="w-full bg-[#252836] text-white px-4 py-3 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-[#7B51D3]">

        <div class="flex items-center w-full mb-6">
            <input type="checkbox" id="terms" class="mr-2 rounded bg-[#252836] border-none">
            <label for="terms" class="text-xs text-gray-400">I agree to <a href="#" class="text-purple-400">Terms & Conditions</a></label>
        </div>

        <button id="createAccBtn" class="w-full bg-[#7B51D3] hover:bg-[#6a42c0] text-white font-semibold py-3 rounded-lg mb-3 transition">
            Create Account
        </button>
        <button id="loginBtn" class="w-full bg-[#10B981] hover:bg-[#0d9488] text-white font-semibold py-3 rounded-lg transition">
            Login
        </button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
